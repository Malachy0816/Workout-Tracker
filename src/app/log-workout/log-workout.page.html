<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-button slot="start">
      <ion-back-button> defaultHref="/home"></ion-back-button>
    </ion-button>
    <ion-title>Log Workouts</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <h1>Log Workouts</h1>
  <p>Timer {{  formatTime(elapsedSeconds)  }}</p>
  <ion-button *ngIf="!workoutStarted" (click)="startWorkout()">Start Workout</ion-button> 

  <ion-button *ngIf="workoutStarted" (click)="goToExercises()">View Exercises</ion-button>
  <div *ngFor="let exercise of currentWorkout.exercises">
  <p>{{ exercise.name }}</p>
</div>
</ion-content>
