<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Exercises</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding exercises-content">
  <ion-searchbar
    [(ngModel)]="searchTerm"
    (ionChange)="onSearchChange()"
    placeholder="Search exercises">
  </ion-searchbar>

  <p *ngIf="exercises.length === 0">No exercises found</p>

  <ion-card *ngFor="let exercise of exercises" (click)="addExerciseToWorkout(exercise)">
    <ion-card-header>
      <ion-card-title>{{ exercise.name }}</ion-card-title>
      <p *ngIf="fromWorkout" class="add-hint">Add to Workout</p>
    </ion-card-header>

    <ion-card-content>
      <p><strong>Body Part:</strong> {{ exercise.bodyPart }}</p>
      <p><strong>Equipment:</strong> {{ exercise.equipment }}</p>
      <p><strong>Target:</strong> {{ exercise.target }}</p>
    </ion-card-content>
  </ion-card>
</ion-content>
